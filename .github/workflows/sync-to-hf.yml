name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v0.0.5
        with:
          repo_type: space
          repo_id: jaideep-1579/innovatrix-env
          hf_token: ${{ secrets.HF_TOKEN }}
